<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#eeddaa"/>
      <stop offset="40%" stop-color="#d4b464"/>
      <stop offset="70%" stop-color="#c49a3c"/>
      <stop offset="100%" stop-color="#dcca80"/>
    </linearGradient>
    <linearGradient id="g2" x1="1" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#eeddaa"/>
      <stop offset="40%" stop-color="#d4b464"/>
      <stop offset="70%" stop-color="#c49a3c"/>
      <stop offset="100%" stop-color="#dcca80"/>
    </linearGradient>
  </defs>
  <!-- Z - thick stroke -->
  <polyline
    points="20,60 230,60 20,452 230,452"
    fill="none"
    stroke="url(#g1)"
    stroke-width="40"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Σ (mirrored Z) - thick stroke -->
  <polyline
    points="492,60 282,60 492,452 282,452"
    fill="none"
    stroke="url(#g2)"
    stroke-width="40"
    stroke-linecap="round"
